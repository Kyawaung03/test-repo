<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediksi Caption Generator - KARTUTOTO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }

        body {
            background: #000000;
            font-family: 'Inter', sans-serif;
            color: #FFFFFF;
        }

        /* Luxury Background */
        .luxury-bg {
            background: linear-gradient(135deg, #000000 0%, #1a1a1a 50%, #000000 100%);
            position: relative;
            overflow: hidden;
            min-height: 100vh;
            width: 100%;
        }

        .luxury-bg::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(234, 208, 105, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(212, 176, 93, 0.03) 0%, transparent 50%);
            pointer-events: none;
        }

        .container-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
        }

        /* Chrome Gradient */
        .chrome-gradient {
            background: linear-gradient(135deg, #E0E0E0 0%, #B1B0B1 50%, #5F5E5C 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Gold Gradient */
        .gold-gradient {
            background: linear-gradient(135deg, #F3D48D 0%, #EAD069 50%, #D4B05D 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Metallic Card */
        .metallic-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.02) 100%);
            border: 1px solid rgba(234, 208, 105, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.4),
                inset 0 1px 1px rgba(255, 255, 255, 0.1),
                0 0 20px rgba(234, 208, 105, 0.1);
            transition: all 0.3s ease;
        }

        .metallic-card:hover {
            border-color: rgba(234, 208, 105, 0.4);
            box-shadow: 
                0 12px 48px rgba(234, 208, 105, 0.15),
                inset 0 1px 1px rgba(255, 255, 255, 0.2),
                0 0 30px rgba(234, 208, 105, 0.2);
            transform: translateY(-2px);
        }

        /* Gold Button */
        .gold-button {
            background: linear-gradient(135deg, #F3D48D 0%, #EAD069 50%, #D4B05D 100%);
            color: #000000;
            font-weight: 700;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 
                0 8px 32px rgba(234, 208, 105, 0.3),
                inset 0 1px 1px rgba(255, 255, 255, 0.3);
            border: none;
            cursor: pointer;
        }

        .gold-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }

        .gold-button:hover::before {
            left: 100%;
        }

        .gold-button:hover {
            box-shadow: 
                0 12px 48px rgba(234, 208, 105, 0.5),
                inset 0 1px 1px rgba(255, 255, 255, 0.5);
            transform: scale(1.02);
        }

        /* Live Clock Card */
        .clock-card {
            background: linear-gradient(135deg, rgba(234, 208, 105, 0.15) 0%, rgba(212, 176, 93, 0.1) 100%);
            border: 2px solid rgba(234, 208, 105, 0.3);
            backdrop-filter: blur(15px);
            box-shadow: 
                0 8px 32px rgba(234, 208, 105, 0.2),
                inset 0 1px 1px rgba(255, 255, 255, 0.1);
        }

        .clock-display {
            font-family: 'Courier New', monospace;
            font-size: clamp(2rem, 8vw, 3.5rem);
            font-weight: 900;
            background: linear-gradient(135deg, #F3D48D 0%, #EAD069 50%, #CBBA98 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(234, 208, 105, 0.3);
            letter-spacing: 2px;
        }

        /* Shift Buttons */
        .shift-button {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.05) 100%);
            border: 2px solid rgba(234, 208, 105, 0.2);
            color: #E0E0E0;
            transition: all 0.3s ease;
            font-weight: 600;
            backdrop-filter: blur(10px);
            cursor: pointer;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            font-size: clamp(0.875rem, 2vw, 1rem);
        }

        .shift-button:hover {
            border-color: rgba(234, 208, 105, 0.5);
            background: linear-gradient(135deg, rgba(234, 208, 105, 0.2) 0%, rgba(212, 176, 93, 0.1) 100%);
            color: #F3D48D;
            box-shadow: 0 0 20px rgba(234, 208, 105, 0.2);
        }

        .shift-button.active {
            background: linear-gradient(135deg, #F3D48D 0%, #EAD069 50%, #D4B05D 100%);
            border-color: #EAD069;
            color: #000000;
            box-shadow: 0 8px 32px rgba(234, 208, 105, 0.4);
        }

        /* Select & Textarea */
        .luxury-input {
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(234, 208, 105, 0.2);
            color: #FFFFFF;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            font-family: inherit;
            font-size: clamp(0.875rem, 2vw, 1rem);
        }

        .luxury-input:focus {
            outline: none;
            border-color: rgba(234, 208, 105, 0.6);
            box-shadow: 0 0 20px rgba(234, 208, 105, 0.2);
            background: rgba(0, 0, 0, 0.7);
        }

        .luxury-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        /* Preview Box */
        .preview-box {
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.6) 0%, rgba(10, 10, 10, 0.4) 100%);
            border: 2px solid rgba(234, 208, 105, 0.2);
            backdrop-filter: blur(10px);
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.5);
            color: #E0E0E0;
            overflow-y: auto;
            padding: 1rem;
            border-radius: 0.5rem;
            font-size: clamp(0.75rem, 1.5vw, 0.875rem);
            line-height: 1.5;
        }

        /* Logo */
        .logo-container {
            animation: float 3s ease-in-out infinite;
            margin-bottom: 1.5rem;
        }

        .logo-img {
            max-width: 100%;
            height: auto;
            width: auto;
            max-height: 200px;
            filter: drop-shadow(0 0 20px rgba(234, 208, 105, 0.3));
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        /* Decorative Elements */
        .gold-line {
            background: linear-gradient(90deg, transparent, #EAD069, transparent);
            height: 2px;
            width: 100%;
            margin: 1.5rem 0;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1rem, 3vw, 1.25rem);
            font-weight: 700;
            background: linear-gradient(135deg, #E0E0E0 0%, #CBBA98 50%, #EAD069 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1px;
        }

        /* Main Title */
        .main-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.5rem, 6vw, 2.5rem);
            font-weight: 900;
            background: linear-gradient(135deg, #F3D48D 0%, #EAD069 30%, #E0E0E0 60%, #CBBA98 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1px;
            text-shadow: 0 0 40px rgba(234, 208, 105, 0.3);
            line-height: 1.2;
        }

        .subtitle {
            color: #CBBA98;
            font-size: clamp(0.75rem, 2vw, 1rem);
            letter-spacing: 0.5px;
            font-weight: 500;
        }

        /* Label Styling */
        .luxury-label {
            color: #E0E0E0;
            font-size: clamp(0.75rem, 1.5vw, 0.875rem);
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-bottom: 0.75rem;
            display: block;
        }

        /* Footer */
        .footer-text {
            font-size: clamp(0.7rem, 1.5vw, 0.875rem);
            letter-spacing: 0.5px;
        }

        /* Responsive Spacing */
        @media (max-width: 768px) {
            .metallic-card {
                padding: 1.5rem;
            }

            .clock-card {
                padding: 1.5rem;
            }

            .logo-img {
                max-height: 150px;
            }
        }

        @media (max-width: 480px) {
            .metallic-card {
                padding: 1rem;
            }

            .clock-card {
                padding: 1rem;
            }

            .logo-img {
                max-height: 120px;
            }

            .gold-line {
                margin: 1rem 0;
            }
        }
    </style>
</head>
<body class="luxury-bg">
    <div class="container-wrapper">
        <div class="min-h-screen flex items-center justify-center p-4 py-6 md:py-8">
            <div class="w-full max-w-2xl">
                
                <!-- Logo Section -->
                <div class="logo-container text-center">
                    <img src="LOGO KARTUTOTO PNG.png" alt="KARTUTOTO" class="logo-img mx-auto">
                </div>

                <!-- Main Title -->
                <div class="text-center mb-6 md:mb-8">
                    <h1 class="main-title mb-2 md:mb-3">PREDIKSI CAPTION GENERATOR</h1>
                    <p class="subtitle">Generate caption prediksi otomatis dengan teknologi terkini</p>
                    <div class="gold-line"></div>
                </div>

                <!-- Live Clock & Date -->
                <div class="clock-card rounded-2xl p-6 md:p-8 mb-6 md:mb-8">
                    <div class="text-center">
                        <div class="clock-display" id="liveClock">00:00:00</div>
                        <div class="text-base md:text-lg mt-3 md:mt-4" id="liveDate" style="color: #CBBA98; letter-spacing: 1px; font-weight: 500;">Senin, 21 Juli 2026</div>
                    </div>
                </div>

                <!-- Main Card -->
                <div class="metallic-card rounded-2xl p-6 md:p-8">
                    
                    <!-- Shift Selection -->
                    <div class="mb-6 md:mb-8">
                        <label class="luxury-label">⚡ Pilih Shift</label>
                        <div class="flex gap-3 md:gap-4">
                            <button onclick="setShift('pagi')" id="btn-pagi" class="shift-button active flex-1 transition-all duration-300">
                                🌅 PAGI
                            </button>
                            <button onclick="setShift('malam')" id="btn-malam" class="shift-button flex-1 transition-all duration-300">
                                🌙 MALAM
                            </button>
                        </div>
                    </div>

                    <div class="gold-line"></div>

                    <!-- Time Selection -->
                    <div class="mb-6 md:mb-8">
                        <label class="luxury-label">⏰ Pilih Jam</label>
                        <select id="jamSelect" onchange="generateCaption()" class="luxury-input">
                            <option value="">-- Pilih Jam --</option>
                        </select>
                    </div>

                    <!-- Customize Message -->
                    <div class="mb-6 md:mb-8">
                        <label class="luxury-label">✏️ Customize Pesan Akhir (Optional)</label>
                        <textarea id="customMessage" placeholder="Biarkan kosong untuk template default: SALAM JACKPOT & TETAP UPS BOSSKU !!! - 🥰" class="luxury-input resize-none" rows="2"></textarea>
                    </div>

                    <div class="gold-line"></div>

                    <!-- Generated Caption Preview -->
                    <div class="mb-6 md:mb-8">
                        <label class="luxury-label">👁️ Preview Caption</label>
                        <div id="captionPreview" class="preview-box min-h-[180px] md:min-h-[200px] max-h-[350px] md:max-h-[400px] whitespace-pre-wrap font-mono">
                            Pilih jam untuk melihat preview caption
                        </div>
                    </div>

                    <!-- Copy Button -->
                    <button onclick="copyCaption()" class="gold-button w-full py-3 md:py-4 px-4 md:px-6 rounded-lg transition-all duration-300 text-base md:text-lg font-semibold">
                        📋 COPY CAPTION
                    </button>

                </div>

                <!-- Footer Info -->
                <div class="text-center mt-6 md:mt-8">
                    <p class="footer-text" style="color: #CBBA98;">Caption akan langsung tercopy ke clipboard Anda</p>
                    <p class="footer-text" style="color: #8A764D; margin-top: 0.3rem;">Siap untuk dikirim ke WA dan Telegram 📱</p>
                </div>

            </div>
        </div>
    </div>

    <script>
        // Data Jadwal Prediksi
        const jadwalPagi = {
            '13.00': ['KOWLOON', 'SINGAPORE', 'JEJULOTTO', 'TOTOBEIJING', 'TTM 4D P3'],
            '15.00': ['TOTOFUZHOU', 'CYPRUS', 'TAIWAN', 'TAICHUNG', 'MEXICO', 'TTM 5D P2'],
            '17.00': ['ICELAND', 'OSLO', 'TTM 4D P4', 'BHUTAN', 'HAITI', 'HONGKONG'],
            '18.00': ['TTM 4D P5', 'KINGKONG P2', 'DENVER', 'TORONTO', 'TTM 4D P6']
        };

        const jadwalMalam = {
            '20.00': ['KENTUCKY MID', 'ROMA', 'FLORIDA MID', 'MONACO', 'NEWYORK MID'],
            '21.00': ['TURIN', 'ITALY', 'CAROLINA DAY', 'CUBA', 'FRANCE'],
            '23.30': ['MADRID', 'OREGON 03', 'BULGARIA', 'HUNGARY', 'MIAMI'],
            '03.00': ['OREGON 06', 'CALIFORNIA', 'FLORIDA EVE', 'OREGON 09', 'NEWYORK EVE'],
            '06.00': ['KENTUCKY EVE', 'CAROLINA EVE', 'ECUADOR', 'AUSTRIA', 'CAMBODIA', 'FOSHAN'],
            '07.30': ['OREGON 12', 'BULLSEYE', 'CHILE', 'LAOS', 'TTM 4D P1'],
            '08.00': ['SYDNEY', 'CHENGDU', 'GUANGDONG', 'TTM 5D P1', 'CHINA'],
            '09.00': ['CHONGQING', 'TTM 4D P2', 'PHILIPPINES', 'KING KONG P1', 'JAPAN']
        };

        let currentShift = 'pagi';
        let currentJam = '';
        let currentCaption = '';

        // Update Live Clock & Date
        function updateLiveTime() {
            const now = new Date();
            
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('liveClock').textContent = `${hours}:${minutes}:${seconds}`;
            
            const days = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
            const months = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
            
            const dayName = days[now.getDay()];
            const date = now.getDate();
            const monthName = months[now.getMonth()];
            const year = now.getFullYear();
            
            document.getElementById('liveDate').textContent = `${dayName}, ${date} ${monthName} ${year}`;
        }

        // Set Shift
        function setShift(shift) {
            currentShift = shift;
            
            const pagiBtn = document.getElementById('btn-pagi');
            const malamBtn = document.getElementById('btn-malam');
            
            if (shift === 'pagi') {
                pagiBtn.classList.add('active');
                malamBtn.classList.remove('active');
            } else {
                malamBtn.classList.add('active');
                pagiBtn.classList.remove('active');
            }
            
            updateJamSelect();
        }

        // Update pilihan jam berdasarkan shift
        function updateJamSelect() {
            const jamSelect = document.getElementById('jamSelect');
            jamSelect.innerHTML = '<option value="">-- Pilih Jam --</option>';

            const jadwal = currentShift === 'pagi' ? jadwalPagi : jadwalMalam;
            Object.keys(jadwal).forEach(jam => {
                const option = document.createElement('option');
                option.value = jam;
                option.textContent = jam;
                jamSelect.appendChild(option);
            });

            currentJam = '';
            currentCaption = '';
            document.getElementById('captionPreview').textContent = 'Pilih jam untuk melihat preview caption';
        }

        // Generate Caption
        function generateCaption() {
            currentJam = document.getElementById('jamSelect').value;
            if (!currentJam) {
                document.getElementById('captionPreview').textContent = 'Pilih jam untuk melihat preview caption';
                return;
            }

            const jadwal = currentShift === 'pagi' ? jadwalPagi : jadwalMalam;
            const pasaran = jadwal[currentJam];

            let tanggalDate = new Date();
            
            if (currentShift === 'malam') {
                tanggalDate.setDate(tanggalDate.getDate() + 1);
            }
            
            const tanggal = formatTanggal(tanggalDate);

            let caption = '♣️♥️ PREDIKSI KARTUTOTO RUMUSAN MASTER MBAH PETRUK HARI INI\n\n';
            caption += `${tanggal}\n\n`;
            caption += pasaran.join('\n');
            caption += '\n\n';

            const customMsg = document.getElementById('customMessage').value.trim();
            caption += customMsg || 'SALAM JACKPOT & TETAP UPS BOSSKU !!! - 🥰';

            currentCaption = caption;
            document.getElementById('captionPreview').textContent = caption;
        }

        // Format Tanggal
        function formatTanggal(date) {
            const months = ['JANUARI', 'FEBRUARI', 'MARET', 'APRIL', 'MEI', 'JUNI', 'JULI', 'AGUSTUS', 'SEPTEMBER', 'OKTOBER', 'NOVEMBER', 'DESEMBER'];

            const day = date.getDate();
            const month = months[date.getMonth()];
            const year = date.getFullYear();

            return `${day} ${month} ${year}`;
        }

        // Copy to Clipboard
        function copyCaption() {
            if (!currentCaption) {
                return;
            }

            navigator.clipboard.writeText(currentCaption).then(() => {
                // Silent copy
            }).catch(err => {
                console.error('Failed to copy:', err);
            });
        }

        // Initialize
        window.addEventListener('load', () => {
            updateLiveTime();
            setShift('pagi');
            
            setInterval(updateLiveTime, 1000);
        });
    </script>
</body>
</html>
